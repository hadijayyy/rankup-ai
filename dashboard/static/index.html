<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RankUp AI - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #eab308;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #475569;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #1e40af, #7c3aed);
            padding: 20px 24px;
            text-align: center;
        }
        
        .header h1 { font-size: 24px; margin-bottom: 4px; }
        .header p { color: var(--text-dim); font-size: 14px; }
        
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        
        .stat-card .label { color: var(--text-dim); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
        .stat-card.total .value { color: var(--accent); }
        .stat-card.positive .value { color: var(--green); }
        .stat-card.negative .value { color: var(--red); }
        .stat-card.alerts .value { color: var(--yellow); }
        
        /* Input Section */
        .input-section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .input-section textarea {
            width: 100%;
            min-height: 100px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 12px;
            font-size: 14px;
            resize: vertical;
            font-family: inherit;
        }
        
        .input-section textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .input-section textarea::placeholder { color: var(--text-dim); }
        
        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        
        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--bg-input); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--border); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Mode Toggle */
        .mode-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .mode-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .mode-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        
        /* Result Section */
        .result-section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            display: none;
        }
        
        .result-section.show { display: block; }
        .result-section h3 { margin-bottom: 16px; font-size: 16px; }
        
        .result-card {
            background: var(--bg-input);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }
        
        .result-card .sentiment-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .sentiment-badge.positive { background: rgba(34,197,94,0.2); color: var(--green); }
        .sentiment-badge.negative { background: rgba(239,68,68,0.2); color: var(--red); }
        .sentiment-badge.neutral { background: rgba(234,179,8,0.2); color: var(--yellow); }
        
        .confidence-bar {
            display: inline-block;
            width: 60px;
            height: 6px;
            background: var(--bg-dark);
            border-radius: 3px;
            margin-left: 8px;
            vertical-align: middle;
            overflow: hidden;
        }
        
        .confidence-bar .fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }
        
        .result-card .review-text {
            color: var(--text-dim);
            font-size: 13px;
            margin: 8px 0;
            font-style: italic;
        }
        
        .result-card .reply-box {
            background: var(--bg-dark);
            border-left: 3px solid var(--accent);
            padding: 10px 12px;
            border-radius: 0 8px 8px 0;
            margin-top: 8px;
        }
        
        .result-card .reply-box .label { color: var(--text-dim); font-size: 11px; text-transform: uppercase; }
        .result-card .reply-box .text { margin-top: 4px; font-size: 14px; }
        
        .result-card .issues {
            margin-top: 8px;
        }
        
        .result-card .issues .tag {
            display: inline-block;
            background: rgba(239,68,68,0.15);
            color: var(--red);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-right: 4px;
            margin-top: 4px;
        }
        
        .result-card .action {
            margin-top: 8px;
            font-size: 13px;
            color: var(--yellow);
        }
        
        /* Two Column Layout */
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        /* Reviews List */
        .reviews-section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
        }
        
        .reviews-section h3 { margin-bottom: 12px; font-size: 16px; }
        
        .review-item {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        
        .review-item:last-child { border-bottom: none; }
        .review-item .text { color: var(--text-dim); margin-bottom: 4px; }
        .review-item .meta { display: flex; gap: 8px; align-items: center; }
        
        /* Alerts */
        .alerts-section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
        }
        
        .alerts-section h3 { margin-bottom: 12px; font-size: 16px; }
        
        .alert-item {
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        
        .alert-item.critical { background: rgba(239,68,68,0.15); border-left: 3px solid var(--red); }
        .alert-item.high { background: rgba(234,179,8,0.15); border-left: 3px solid var(--yellow); }
        .alert-item .level { font-weight: 700; text-transform: uppercase; font-size: 11px; }
        
        .empty-state {
            color: var(--text-dim);
            text-align: center;
            padding: 30px;
            font-size: 14px;
        }
        
        /* Loading */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--red);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            z-index: 1000;
            max-width: 400px;
        }
        
        .toast.show { display: block; }
        .toast.success { background: var(--green); }
        
        @media (max-width: 640px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .two-col { grid-template-columns: 1fr; }
            .btn-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 RankUp AI Dashboard</h1>
        <p>AI-Powered Review Management for TikTok Shop</p>
    </div>
    
    <div class="container">
        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card total">
                <div class="label">Total Reviews</div>
                <div class="value" id="stat-total">0</div>
            </div>
            <div class="stat-card positive">
                <div class="label">Positive</div>
                <div class="value" id="stat-positive">0%</div>
            </div>
            <div class="stat-card negative">
                <div class="label">Negative</div>
                <div class="value" id="stat-negative">0%</div>
            </div>
            <div class="stat-card alerts">
                <div class="label">Alerts</div>
                <div class="value" id="stat-alerts">0</div>
            </div>
        </div>
        
        <!-- Input -->
        <div class="input-section">
            <div class="mode-toggle">
                <button class="mode-btn active" onclick="setMode('single')">Single Review</button>
                <button class="mode-btn" onclick="setMode('bulk')">Bulk Reviews</button>
            </div>
            <textarea id="review-input" placeholder="Masukkan review TikTok Shop...&#10;&#10;Contoh: Barang sampe pecah, parah banget!"></textarea>
            <div class="btn-row">
                <button class="btn btn-primary" id="btn-analyze" onclick="analyzeReview()">🔍 Analisis</button>
                <button class="btn btn-secondary" onclick="clearAll()">🗑️ Clear</button>
            </div>
        </div>
        
        <!-- Results -->
        <div class="result-section" id="result-section">
            <h3>📊 Hasil Analisis</h3>
            <div id="result-content"></div>
        </div>
        
        <!-- Two Column: Reviews + Alerts -->
        <div class="two-col">
            <div class="reviews-section">
                <h3>📝 Recent Reviews</h3>
                <div id="reviews-list">
                    <div class="empty-state">Belum ada review. Mulai analisis di atas!</div>
                </div>
            </div>
            <div class="alerts-section">
                <h3>🚨 Alerts</h3>
                <div id="alerts-list">
                    <div class="empty-state">Tidak ada alerts. Semua aman! ✅</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast"></div>
    
    <script>
        // ─── State ───
        let mode = 'single';
        let allReviews = [];
        let allAlerts = [];
        
        // ─── Config ───
        const API_BASE = window.location.origin + '/api';
        
        // ─── Mode Toggle ───
        function setMode(m) {
            mode = m;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            const ta = document.getElementById('review-input');
            if (m === 'bulk') {
                ta.placeholder = "Masukkan review (satu per baris)...\n\nBarang sampe pecah!\nBarang bagus banget\nBiasa aja sih";
                ta.style.minHeight = '150px';
            } else {
                ta.placeholder = "Masukkan review TikTok Shop...\n\nContoh: Barang sampe pecah, parah banget!";
                ta.style.minHeight = '100px';
            }
        }
        
        // ─── Toast ───
        function showToast(msg, type = 'error') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show ' + type;
            setTimeout(() => t.className = 'toast', 3000);
        }
        
        // ─── API Call ───
        async function apiCall(endpoint, body) {
            try {
                const resp = await fetch(API_BASE + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                return await resp.json();
            } catch (err) {
                showToast('API Error: ' + err.message);
                throw err;
            }
        }
        
        // ─── Analyze ───
        async function analyzeReview() {
            const input = document.getElementById('review-input').value.trim();
            if (!input) { showToast('Masukkan review terlebih dahulu!'); return; }
            
            const btn = document.getElementById('btn-analyze');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Analisis...';
            
            try {
                if (mode === 'single') {
                    const data = await apiCall('/classify', { review: input });
                    allReviews.unshift(data);
                    if (data.confidence >= 80 && data.sentiment === 'negative') {
                        allAlerts.unshift({
                            level: data.key_issues && data.key_issues.length > 1 ? 'critical' : 'high',
                            review_id: allReviews.length,
                            text: input.substring(0, 80)
                        });
                    }
                    renderResults([data]);
                } else {
                    const reviews = input.split('\n').filter(r => r.trim());
                    if (reviews.length === 0) { showToast('Masukkan minimal 1 review!'); return; }
                    
                    const data = await apiCall('/classify-bulk', { reviews: reviews });
                    if (data.reviews) {
                        allReviews = [...data.reviews.map((r, i) => ({
                            ...r,
                            review: reviews[i] || ''
                        })), ...allReviews];
                    }
                    if (data.alerts) {
                        allAlerts = [...data.alerts, ...allAlerts];
                    }
                    renderResults(data.reviews || []);
                    showToast(`${reviews.length} reviews berhasil dianalisis!`, 'success');
                }
                updateStats();
                renderReviewsList();
                renderAlertsList();
                document.getElementById('result-section').classList.add('show');
            } catch (err) {
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🔍 Analisis';
            }
        }
        
        // ─── Render Results ───
        function renderResults(reviews) {
            const container = document.getElementById('result-content');
            container.innerHTML = reviews.map((r, i) => `
                <div class="result-card">
                    <div>
                        <span class="sentiment-badge ${r.sentiment}">${r.sentiment || 'unknown'}</span>
                        <span style="font-size:12px;color:var(--text-dim);margin-left:8px;">
                            Confidence: ${r.confidence || 0}%
                            <span class="confidence-bar">
                                <span class="fill" style="width:${r.confidence || 0}%;background:${sentimentColor(r.sentiment)}"></span>
                            </span>
                        </span>
                    </div>
                    <div class="review-text">"${r.review || ''}"</div>
                    ${r.key_issues && r.key_issues.length > 0 ? `
                        <div class="issues">
                            ${r.key_issues.map(issue => `<span class="tag">${issue}</span>`).join('')}
                        </div>
                    ` : ''}
                    ${r.recommended_action ? `<div class="action">⚡ ${r.recommended_action}</div>` : ''}
                    ${r.reply_text ? `
                        <div class="reply-box">
                            <div class="label">💬 Suggested Reply</div>
                            <div class="text">${r.reply_text}</div>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }
        
        // ─── Update Stats ───
        function updateStats() {
            const total = allReviews.length;
            const positive = allReviews.filter(r => r.sentiment === 'positive').length;
            const negative = allReviews.filter(r => r.sentiment === 'negative').length;
            
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-positive').textContent = total ? Math.round(positive / total * 100) + '%' : '0%';
            document.getElementById('stat-negative').textContent = total ? Math.round(negative / total * 100) + '%' : '0%';
            document.getElementById('stat-alerts').textContent = allAlerts.length;
        }
        
        // ─── Render Reviews List ───
        function renderReviewsList() {
            const container = document.getElementById('reviews-list');
            if (allReviews.length === 0) {
                container.innerHTML = '<div class="empty-state">Belum ada review. Mulai analisis di atas!</div>';
                return;
            }
            container.innerHTML = allReviews.slice(0, 20).map(r => `
                <div class="review-item">
                    <div class="text">"${(r.review || '').substring(0, 100)}${(r.review || '').length > 100 ? '...' : ''}"</div>
                    <div class="meta">
                        <span class="sentiment-badge ${r.sentiment}" style="font-size:10px;">${r.sentiment || 'unknown'}</span>
                        <span style="color:var(--text-dim);font-size:11px;">Confidence: ${r.confidence || 0}%</span>
                    </div>
                    ${r.reply_text ? `<div style="margin-top:4px;font-size:12px;color:var(--accent);">💬 ${r.reply_text.substring(0, 80)}...</div>` : ''}
                </div>
            `).join('');
        }
        
        // ─── Render Alerts ───
        function renderAlertsList() {
            const container = document.getElementById('alerts-list');
            if (allAlerts.length === 0) {
                container.innerHTML = '<div class="empty-state">Tidak ada alerts. Semua aman! ✅</div>';
                return;
            }
            container.innerHTML = allAlerts.slice(0, 10).map(a => `
                <div class="alert-item ${a.level}">
                    <div class="level">${a.level || 'info'}</div>
                    <div style="margin-top:4px;">Review #${a.review_id}: "${a.text}"</div>
                </div>
            `).join('');
        }
        
        // ─── Clear ───
        function clearAll() {
            document.getElementById('review-input').value = '';
            document.getElementById('result-section').classList.remove('show');
            document.getElementById('result-content').innerHTML = '';
            allReviews = [];
            allAlerts = [];
            updateStats();
            renderReviewsList();
            renderAlertsList();
        }
        
        // ─── Helper ───
        function sentimentColor(s) {
            if (s === 'positive') return 'var(--green)';
            if (s === 'negative') return 'var(--red)';
            return 'var(--yellow)';
        }
        
        // ─── Init: Load stats from API ───
        (async function init() {
            try {
                const resp = await fetch(API_BASE + '/stats');
                if (resp.ok) {
                    const data = await resp.json();
                    if (data.total_reviews !== undefined) {
                        document.getElementById('stat-total').textContent = data.total_reviews || 0;
                        document.getElementById('stat-positive').textContent = (data.positive_rate || 0) + '%';
                        document.getElementById('stat-negative').textContent = (data.negative_rate || 0) + '%';
                        document.getElementById('stat-alerts').textContent = data.alerts || 0;
                    }
                }
            } catch (e) { /* stats endpoint might not have data yet */ }
        })();
    </script>
</body>
</html>
